table_name: bronze.equipment_status_log
type: event_log

primary_key:
  - status_event_id

incremental_column: recorded_at

columns:
  - name: status_event_id
    type: string
    nullable: false

  - name: equipment_id
    type: string

  - name: status
    type: string

  - name: recorded_at
    type: timestamp

  - name: operator_id
    type: string

  - name: notes
    type: string

  - name: _ingested_at
    type: timestamp