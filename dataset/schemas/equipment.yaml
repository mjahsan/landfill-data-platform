table_name: bronze.equipment
type: dimension

primary_key:
  - equipment_id

incremental_column: _ingested_at

columns:
  - name: equipment_id
    type: string
    nullable: false

  - name: equipment_name
    type: string

  - name: equipment_type
    type: string

  - name: manufacturer
    type: string

  - name: model_number
    type: string

  - name: purchase_date
    type: date

  - name: site_id
    type: string

  - name: _source_file
    type: string

  - name: _ingested_at
    type: timestamp

  - name: _row_hash
    type: string