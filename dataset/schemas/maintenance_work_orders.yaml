table_name: bronze.maintenance_work_orders
type: fact

primary_key:
  - work_order_id

incremental_column: _ingested_at

columns:
  - name: work_order_id
    type: string
    nullable: false

  - name: equipment_id
    type: string

  - name: work_order_type
    type: string

  - name: opened_date
    type: date

  - name: closed_date
    type: date

  - name: technician_id
    type: string

  - name: parts_cost_usd
    type: decimal

  - name: labor_hours
    type: decimal

  - name: labor_cost_usd
    type: decimal

  - name: description
    type: string

  - name: _ingested_at
    type: timestamp

  - name: _row_hash
    type: string